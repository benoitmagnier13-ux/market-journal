<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <title>Market Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #222; }
    .header { background: #1a1a2e; padding: 16px 20px 0; }
    .header h1 { color: #fff; font-size: 18px; margin-bottom: 2px; }
    .header p { color: #8892a4; font-size: 11px; margin-bottom: 12px; }
    .tabs { display: flex; }
    .tab { background: transparent; color: #8892a4; border: none; padding: 10px 18px; font-size: 13px; cursor: pointer; border-radius: 8px 8px 0 0; font-family: inherit; }
    .tab.active { background: #fff; color: #1a1a2e; font-weight: 700; }
    .content { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; border: 1px solid #e8ecf0; }
    .asset-row { margin-bottom: 14px; }
    .asset-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .btns { display: flex; gap: 6px; }
    .btn-sentiment { flex: 1; padding: 9px 0; border: 1.5px solid #dde1e7; border-radius: 7px; background: #fff; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-sentiment.sel-n2 { border-color: #c0392b; background: #fdf0ee; color: #c0392b; font-weight: 700; }
    .btn-sentiment.sel-n1 { border-color: #e67e22; background: #fef9f0; color: #e67e22; font-weight: 700; }
    .btn-sentiment.sel-0  { border-color: #7f8c8d; background: #f5f6fa; color: #7f8c8d; font-weight: 700; }
    .btn-sentiment.sel-p1 { border-color: #27ae60; background: #edfaf3; color: #27ae60; font-weight: 700; }
    .btn-sentiment.sel-p2 { border-color: #1a7a4a; background: #d5f5e3; color: #1a7a4a; font-weight: 700; }
    textarea { width: 100%; border: 1.5px solid #dde1e7; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; margin-top: 4px; }
    .btn-save { width: 100%; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
    .label-sm { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    input[type=date] { border: 1.5px solid #dde1e7; border-radius: 7px; padding: 8px 12px; font-size: 14px; width: 100%; margin-top: 4px; font-family: inherit; }
    .entry-date { font-weight: 700; color: #1a1a2e; font-size: 14px; margin-bottom: 8px; }
    .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .comment-block { font-size: 13px; color: #555; line-height: 1.5; border-left: 3px solid #1a1a2e; padding-left: 10px; }
    .status { color: #27ae60; font-size: 12px; font-weight: 600; margin-left: 12px; }
    .empty { text-align: center; padding: 50px 20px; color: #aaa; }
    .avg-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
  </style>
</head>
<body>
<div class="header">
  <h1>Market Journal <span class="status" id="status"></span></h1>
  <p>Wealth Management</p>
  <div class="tabs">
   <button class="tab active" onclick="showTab('journal')">Journal</button>
<button class="tab" onclick="showTab('saisie')">Saisie</button>
<button class="tab" onclick="showTab('synthese')">Synthèse</button>
<button class="tab" onclick="showTab('briefing')">Briefing</button>
  </div>
</div>
<div class="content">
  <div id="tab-journal">
    <div id="entries-list"><div class="empty">⏳ Chargement...</div></div>
  </div>
  <div id="tab-saisie" style="display:none">
    <div class="card">
      <div style="margin-bottom:16px">
        <div class="label-sm">Date</div>
        <input type="date" id="entry-date">
      </div>
      <div id="assets-form"></div>
      <div style="margin-top:16px">
        <div class="label-sm">Commentaire</div>
        <textarea id="comment" rows="4" placeholder="Ton analyse du jour..."></textarea>
      </div>
      <button class="btn-save" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>
  <div id="tab-synthese" style="display:none">
    <div class="card" id="synthese-content"><div class="empty">Aucune donnée</div></div>
  </div>
  <div id="tab-briefing" style="display:none">
  <div id="briefing-content"><div class="empty">⏳ Chargement...</div></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://chgvntaippgbljedbnir.supabase.co',
  'sb_publishable_Q8igJiH4Vm7n231OKhXtew_XkNWIHFw'
)
const ASSETS = [
  { key: 'eurusd',   label: 'EUR/USD' },
  { key: 'usdjpy',   label: 'USD/JPY' },
  { key: 'sp500',    label: 'S&P 500' },
  { key: 'nasdaq',   label: 'Nasdaq' },
  { key: 'topix',    label: 'Topix' },
  { key: 'europe',   label: 'Actions Europe' },
  { key: 'gold',     label: 'Or' },
  { key: 'oil',      label: 'Pétrole' },
  { key: 'us_rates', label: 'Taux US 10Y' },
  { key: 'eu_rates', label: 'Taux EUR 10Y' },
]
const COLORS = { '-2':'#c0392b','-1':'#e67e22','0':'#7f8c8d','1':'#27ae60','2':'#1a7a4a' }
const SELCLASS = { '-2':'sel-n2','-1':'sel-n1','0':'sel-0','1':'sel-p1','2':'sel-p2' }
let entries = [], sentiments = {}
document.getElementById('entry-date').value = new Date().toISOString().split('T')[0]

const form = document.getElementById('assets-form')
ASSETS.forEach(a => {
  const row = document.createElement('div')
  row.className = 'asset-row'
  row.innerHTML = `<div class="asset-label">${a.label}</div><div class="btns" id="btns-${a.key}"></div>`
  form.appendChild(row)
  sentiments[a.key] = null
  const btns = document.getElementById('btns-' + a.key)
  ;[-2,-1,0,1,2].forEach(v => {
    const b = document.createElement('button')
    b.className = 'btn-sentiment'
    b.textContent = v > 0 ? '+'+v : v
    b.onclick = () => setSentiment(a.key, v)
    btns.appendChild(b)
  })
})

function setSentiment(key, val) {
  sentiments[key] = val
  const btns = document.getElementById('btns-' + key).querySelectorAll('button')
  const vals = [-2,-1,0,1,2]
  btns.forEach((b,i) => {
    b.className = 'btn-sentiment' + (sentiments[key]===vals[i] ? ' '+SELCLASS[vals[i]] : '')
  })
}

function showTab(name) {
;['journal','saisie','synthese','briefing'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? '' : 'none'
    document.querySelectorAll('.tab')[['journal','saisie','synthese'].indexOf(t)].classList.toggle('active', t===name)
  })
  if (name === 'synthese') renderSynthese()
}

function fmt(d) { const [y,m,day]=d.split('-'); return `${day}/${m}/${y}` }
async function loadBriefing() {
  const { data, error } = await sb.from('briefings').select('*').order('briefing_date', { ascending: false }).limit(1)
  const el = document.getElementById('briefing-content')
  if (!error && data && data.length > 0) {
    const b = data[0]
    el.innerHTML = `<div class="card" style="white-space:pre-wrap;line-height:1.7;font-size:14px"><div style="font-weight:700;color:#1a1a2e;margin-bottom:12px">📊 Briefing du ${new Date(b.briefing_date).toLocaleDateString('fr-FR')}</div>${b.content}</div>`
  } else {
    el.innerHTML = '<div class="empty">Aucun briefing disponible</div>'
  }
}
async function loadEntries() {
  const { data, error } = await sb.from('entries').select('*').order('entry_date', { ascending: false })
  if (!error && data) { entries = data; renderJournal() }
}

function renderJournal() {
  const el = document.getElementById('entries-list')
  if (!entries.length) { el.innerHTML = '<div class="empty">📓<br>Aucune entrée</div>'; return }
  el.innerHTML = entries.map(e => {
    const badges = ASSETS.filter(a => e[a.key] !== null && e[a.key] !== undefined)
      .map(a => `<span class="badge" style="background:${COLORS[e[a.key]]}20;color:${COLORS[e[a.key]]};border:1px solid ${COLORS[e[a.key]]}40">${a.label} ${e[a.key]>0?'+':''}${e[a.key]}</span>`).join('')
    const comment = e.comment ? `<div class="comment-block">${e.comment}</div>` : ''
    return `<div class="card"><div class="entry-date">${fmt(e.entry_date)}</div><div class="badges">${badges}</div>${comment}</div>`
  }).join('')
}

function renderSynthese() {
  const el = document.getElementById('synthese-content')
  if (!entries.length) { el.innerHTML = '<div class="empty">Aucune donnée</div>'; return }
  const rows = ASSETS.map(a => {
    const vals = entries.map(e => e[a.key]).filter(v => v !== null && v !== undefined)
    if (!vals.length) return ''
    const avg = (vals.reduce((x,y)=>x+y,0)/vals.length).toFixed(2)
    const color = COLORS[Math.round(parseFloat(avg))]
    return `<div class="avg-row"><span>${a.label}</span><span style="font-weight:700;color:${color}">${parseFloat(avg)>0?'+':''}${avg}</span></div>`
  }).join('')
  el.innerHTML = `<div class="label-sm" style="margin-bottom:12px">Moyenne sur ${entries.length} entrée${entries.length>1?'s':''}</div>${rows}`
}

async function saveEntry() {
  const date = document.getElementById('entry-date').value
  const comment = document.getElementById('comment').value
  if (!date) { alert('Choisis une date'); return }
  const row = { entry_date: date, comment, ...sentiments }
  const { error } = await sb.from('entries').upsert(row, { onConflict: 'entry_date' })
  if (error) {
    document.getElementById('status').textContent = '❌ Erreur'
    document.getElementById('status').style.color = '#e74c3c'
  } else {
    document.getElementById('status').textContent = '✅ Sauvegardé'
    document.getElementById('status').style.color = '#27ae60'
    await loadEntries()
    showTab('journal')
  }
  setTimeout(() => document.getElementById('status').textContent = '', 3000)
}
async function loadBriefing() {
  const { data, error } = await sb.from('briefings').select('*').order('briefing_date', { ascending: false }).limit(1)
  const el = document.getElementById('briefing-content')
  if (!error && data && data.length > 0) {
    const b = data[0]
    let text = typeof b.content === 'string' ? b.content : JSON.stringify(b.content)
text = text
  .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
  .replace(/^### (.*)/gm, '<div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-top:12px">$1</div>')
  .replace(/^## (.*)/gm, '<div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-top:14px">$1</div>')
  .replace(/^# (.*)/gm, '<div style="font-size:16px;font-weight:700;color:#1a1a2e;margin-top:16px">$1</div>')
  .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #e8ecf0;margin:10px 0">')
  .replace(/\n/g, '<br>')
el.innerHTML = `<div class="card" style="line-height:1.7;font-size:14px"><div style="font-weight:700;color:#1a1a2e;margin-bottom:12px">📊 Briefing du ${new Date(b.briefing_date).toLocaleDateString('fr-FR')}</div>${text}</div>`
  } else {
    el.innerHTML = '<div class="empty">Aucun briefing disponible</div>'
  }
}

loadBriefing()
loadEntries()
loadEntries()
  loadBriefing()
</script>
</body>
</html>
